<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pawse Control Panel</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">🐕</span>
      <div>
        <h1>Pawse Control Panel</h1>
        <p>the pomeranian that makes you take breaks</p>
      </div>
    </div>
    <div class="status">
      <span id="statusLine">…</span>
      <button id="pauseBtn" type="button" class="ghost">Pause 1h</button>
      <button id="resumeBtn" type="button" class="ghost hidden">Resume</button>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>Schedule</h2>
      <label class="row">
        <span>Break every</span>
        <span class="unit"><input id="interval" type="number" min="1" max="720" /> minutes</span>
      </label>
      <div class="row col">
        <span>…or at fixed times <em>(overrides the interval)</em></span>
        <div class="times">
          <div id="timesChips" class="chips"></div>
          <input id="fixedTimeInput" type="time" />
          <button id="addTime" type="button" class="ghost">Add</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>The break</h2>
      <label class="row">
        <span>Break length</span>
        <span class="unit"><input id="breakSeconds" type="number" min="5" max="600" /> seconds</span>
      </label>
      <label class="row col">
        <span>Messages <em>(one per line, rotates)</em></span>
        <textarea id="messages" rows="3" spellcheck="false"></textarea>
      </label>
      <label class="row">
        <span>Sound</span>
        <input id="sound" type="checkbox" class="switch" />
      </label>
      <label class="row">
        <span>Emergency escape <em>(hold ESC to skip, turn off for hard mode)</em></span>
        <input id="allowEscape" type="checkbox" class="switch" />
      </label>
      <label class="row" id="escHoldRow">
        <span>ESC hold time</span>
        <span class="unit"><input id="escHold" type="number" min="1" max="10" /> seconds</span>
      </label>
    </section>

    <section class="card">
      <h2>Your dog</h2>
      <label class="row">
        <span>Name</span>
        <input id="dogName" type="text" maxlength="24" />
      </label>
      <label class="row">
        <span>Style <em>(Real plays video clips of an actual dog)</em></span>
        <select id="dogStyle">
          <option value="auto">Auto, real when clips exist</option>
          <option value="video">Real (video)</option>
          <option value="3d">3D (procedural)</option>
        </select>
      </label>
      <div class="row">
        <span>Coat</span>
        <div class="swatches" id="swatches">
          <button type="button" data-coat="golden" style="background:#d59a52" title="Golden"></button>
          <button type="button" data-coat="cream" style="background:#e6d0a8" title="Cream"></button>
          <button type="button" data-coat="red" style="background:#b46a3c" title="Red"></button>
          <button type="button" data-coat="chocolate" style="background:#6d4a32" title="Chocolate"></button>
          <input id="coatCustom" type="color" value="#d59a52" title="Custom coat color" />
        </div>
      </div>
    </section>

    <section class="card">
      <h2>System</h2>
      <label class="row">
        <span>Launch at login</span>
        <input id="autostart" type="checkbox" class="switch" />
      </label>
      <p class="note">Pawse has no network access, everything below stays on this device.</p>
    </section>

    <section class="card wide">
      <h2>Mood after breaks</h2>
      <div id="moodStrip" class="mood-strip"></div>
      <p id="moodSummary" class="note"></p>
    </section>
  </main>

  <footer>
    <button id="tryBreak" type="button" class="ghost">🐾 Try a break now</button>
    <span id="savedToast" class="toast"></span>
    <button id="save" type="button" class="primary">Save</button>
  </footer>

  <script type="module" src="settings.js"></script>
</body>
</html>
