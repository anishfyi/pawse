<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7ead2"/>
      <stop offset="1" stop-color="#eed9b4"/>
    </linearGradient>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="212" fill="url(#bg)"/>
  <!-- ears -->
  <ellipse cx="322" cy="430" rx="110" ry="185" fill="#b97f3e" transform="rotate(18 322 430)"/>
  <ellipse cx="702" cy="430" rx="110" ry="185" fill="#b97f3e" transform="rotate(-18 702 430)"/>
  <!-- head -->
  <circle cx="512" cy="470" r="240" fill="#d59a52"/>
  <!-- muzzle -->
  <ellipse cx="512" cy="570" rx="150" ry="120" fill="#efdcb4"/>
  <!-- eyes -->
  <circle cx="428" cy="440" r="30" fill="#2a1c10"/>
  <circle cx="596" cy="440" r="30" fill="#2a1c10"/>
  <circle cx="438" cy="430" r="9" fill="#fff"/>
  <circle cx="606" cy="430" r="9" fill="#fff"/>
  <!-- nose -->
  <ellipse cx="512" cy="540" rx="44" ry="34" fill="#241a14"/>
  <!-- mouth -->
  <path d="M512 574 q0 46 -52 46 M512 574 q0 46 52 46" stroke="#241a14" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- tongue -->
  <path d="M472 640 q40 66 80 0 q-8 56 -40 56 q-32 0 -40 -56z" fill="#e98a9c"/>
  <!-- paw print accent -->
  <g fill="#b97f3e" opacity="0.9">
    <ellipse cx="716" cy="768" rx="34" ry="28"/>
    <circle cx="676" cy="722" r="14"/>
    <circle cx="708" cy="708" r="14"/>
    <circle cx="742" cy="714" r="14"/>
    <circle cx="766" cy="738" r="13"/>
  </g>
</svg>
